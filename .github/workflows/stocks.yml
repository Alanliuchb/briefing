name: 更新持股看板

on:
  workflow_dispatch:          # 允許手動執行

permissions:
  contents: write

concurrency:
  group: stocks-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 抓取報價並加密
        env:
          VIEW_PASSWORD: ${{ secrets.VIEW_PASSWORD }}
          PORTFOLIO_HOLDINGS: ${{ secrets.PORTFOLIO_HOLDINGS }}
        run: node stocks/update.mjs

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/data.enc
          if git diff --staged --quiet; then
            echo "沒有變更"
          else
            git commit -m "更新持股資料 $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
