<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026-07-20 每日彙整</title>
<style>
  * { box-sizing: border-box; }
  body { background:#0f1117; color:#e8eaf0; font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC",sans-serif; margin:0; padding:24px 16px; line-height:1.7; }
  .wrap { max-width:820px; margin:0 auto; }
  .nav { font-size:14px; margin-bottom:18px; }
  .nav a { color:#4f6ef7; text-decoration:none; }
  .nav a:hover { text-decoration:underline; }
  h1 { font-size:26px; margin:0 0 6px; }
  .sub { color:#8b93a7; font-size:14px; margin-bottom:28px; }
  .empty { background:#1e2130; border:1px solid #2a2f42; border-radius:10px; padding:32px 20px; text-align:center; color:#a0aec0; }
  .empty .icon { font-size:34px; display:block; margin-bottom:10px; }
  footer { margin-top:36px; padding-top:16px; border-top:1px solid #2a2f42; color:#6b7488; font-size:13px; }
  .analyze-btn {
    display: inline-block; margin-top: 8px; padding: 6px 14px;
    background: transparent; border: 1px solid #4f6ef7; border-radius: 6px;
    color: #a0aec0; font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .analyze-btn:hover { background: rgba(79,110,247,0.13); color: #e8eaf0; }
  .copy-toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #4f6ef7; color: white; padding: 10px 20px;
    border-radius: 8px; font-size: 14px; z-index: 9999;
    transition: opacity 0.5s; opacity: 1;
  }
  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-top: 12px; }
  .photo-item { cursor: pointer; border-radius: 8px; overflow: hidden; background: var(--card, #1e2130); }
  .photo-item img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
  .photo-caption { font-size: 12px; color: #a0aec0; padding: 6px 8px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="nav"><a href="../../index.html">← 回到彙整首頁</a></div>
  <h1>2026年7月20日 星期一</h1>
  <div class="sub">每日記錄彙整</div>

  <div class="empty">
    <span class="icon">📭</span>
    今天的 Google Drive 資料夾沒有新增任何資料。
  </div>

  <footer>生成時間：2026-07-20 18:03（台灣時間）</footer>
</div>

<div id="lightbox" onclick="this.style.display='none'" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;cursor:pointer;align-items:center;justify-content:center;">
  <img id="lightbox-img" style="max-width:90%;max-height:90vh;border-radius:8px;">
</div>
<script>
function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').style.display = 'flex';
}
function requestAnalysis(btn, date, title) {
  const text = '幫我深度分析 ' + date + ' 的 PDF：' + title;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent; btn.textContent = '已複製 ✓';
    setTimeout(() => btn.textContent = orig, 2000);
    showToast('✅ 已複製！請貼給 Claude');
  });
}
function showToast(msg) {
  const t = document.createElement('div'); t.className = 'copy-toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; }, 2000);
  setTimeout(() => { t.remove(); }, 2500);
}
</script>
</body>
</html>
