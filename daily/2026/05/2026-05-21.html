<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年5月21日 — 每日記錄</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0f1117;
  color: #e8eaf0;
  min-height: 100vh;
  padding: 24px 16px;
  max-width: 720px;
  margin: 0 auto;
}
a { color: inherit; text-decoration: none; }
.nav-back {
  font-size: 0.85rem;
  color: #6b7280;
  margin-bottom: 24px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: color 0.15s;
}
.nav-back:hover { color: #9ca3af; }
.date-header {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #4f6ef7;
  margin-bottom: 6px;
}
h1 {
  font-size: 1.5rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 6px;
}
.weekday {
  font-size: 0.85rem;
  color: #6b7280;
  margin-bottom: 32px;
}
.section { margin-bottom: 32px; }
.section-title {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #6b7280;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #1f2937;
  display: flex;
  align-items: center;
  gap: 8px;
}
/* Notes */
.note-box {
  background: #1a1d27;
  border: 1px solid #2d3142;
  border-radius: 12px;
  padding: 18px 20px;
  font-size: 0.9rem;
  color: #d1d5db;
  line-height: 1.7;
  white-space: pre-wrap;
}
/* URL items */
.url-item {
  background: #1a1d27;
  border: 1px solid #2d3142;
  border-radius: 12px;
  padding: 14px 18px;
  margin-bottom: 10px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  transition: border-color 0.15s, background 0.15s;
}
.url-item:hover { border-color: #4f6ef7; background: #1f2336; }
.url-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; }
.url-info { flex: 1; min-width: 0; }
.url-title { font-size: 0.9rem; font-weight: 600; color: #fff; margin-bottom: 3px; word-break: break-word; }
.url-link { font-size: 0.75rem; color: #6b7280; word-break: break-all; }
/* File items */
.file-item {
  background: #1a1d27;
  border: 1px solid #2d3142;
  border-radius: 12px;
  padding: 14px 18px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: border-color 0.15s;
}
.file-item:hover { border-color: #4f6ef7; }
.file-icon { font-size: 1.3rem; flex-shrink: 0; }
.file-info { flex: 1; }
.file-name { font-size: 0.9rem; font-weight: 600; color: #fff; }
.file-type { font-size: 0.75rem; color: #6b7280; margin-top: 2px; }
.file-link { font-size: 0.75rem; color: #4f6ef7; margin-top: 3px; }
/* Images */
.img-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}
.img-thumb {
  border-radius: 10px;
  overflow: hidden;
  background: #1a1d27;
  border: 1px solid #2d3142;
  aspect-ratio: 4/3;
  display: flex;
  align-items: center;
  justify-content: center;
}
.img-thumb img { width: 100%; height: 100%; object-fit: cover; }
.img-label { font-size: 0.75rem; color: #6b7280; padding: 6px 8px; }
.empty { font-size: 0.9rem; color: #4b5563; font-style: italic; padding: 8px 0; }
.generated-note {
  font-size: 0.75rem;
  color: #374151;
  margin-top: 40px;
  text-align: center;
}
</style>
</head>
<body>

<a class="nav-back" href="../../index.html">← 回到每日記錄</a>

<div class="date-header">每日記錄</div>
<h1>2026 年 5 月 21 日</h1>
<p class="weekday">星期四</p>

<!-- NOTES SECTION -->
<div class="section" id="sec-notes" style="display:none">
  <div class="section-title">🗒️ 筆記</div>
  <div class="note-box" id="notes-content"></div>
</div>

<!-- URLs SECTION -->
<div class="section" id="sec-urls" style="display:none">
  <div class="section-title">🔗 連結</div>
  <div id="urls-list"></div>
</div>

<!-- FILES SECTION -->
<div class="section" id="sec-files" style="display:none">
  <div class="section-title">📎 檔案</div>
  <div id="files-list"></div>
</div>

<!-- IMAGES SECTION -->
<div class="section" id="sec-images" style="display:none">
  <div class="section-title">🖼️ 照片</div>
  <div class="img-grid" id="images-grid"></div>
</div>

<div id="no-content" class="empty" style="text-align:center; margin-top: 40px;">
  今天的資料還在 Google Drive 等你 📁
</div>

<p class="generated-note" id="gen-note"></p>

<script>
// ── DAILY CONTENT DATA (auto-generated by compile script) ──
const DATA = {
  date: "2026-05-21",
  title: "",
  notes: "",
  urls: [],
  files: [],
  images: [],
  generated: ""
};
// ── END DATA ──

let hasContent = false;

if (DATA.notes) {
  document.getElementById('notes-content').textContent = DATA.notes;
  document.getElementById('sec-notes').style.display = 'block';
  hasContent = true;
}

if (DATA.urls && DATA.urls.length) {
  const list = document.getElementById('urls-list');
  DATA.urls.forEach(u => {
    const el = document.createElement('a');
    el.className = 'url-item';
    el.href = u.url;
    el.target = '_blank';
    el.innerHTML = `
      <span class="url-icon">🌐</span>
      <div class="url-info">
        <div class="url-title">${u.title || u.url}</div>
        <div class="url-link">${u.url}</div>
      </div>`;
    list.appendChild(el);
  });
  document.getElementById('sec-urls').style.display = 'block';
  hasContent = true;
}

if (DATA.files && DATA.files.length) {
  const list = document.getElementById('files-list');
  DATA.files.forEach(f => {
    const el = document.createElement('a');
    el.className = 'file-item';
    el.href = f.drive_url || '#';
    el.target = '_blank';
    const icon = {pdf:'📄', doc:'📝', docx:'📝', xls:'📊', xlsx:'📊', ppt:'📊', pptx:'📊'}[f.ext?.toLowerCase()] || '📎';
    el.innerHTML = `
      <span class="file-icon">${icon}</span>
      <div class="file-info">
        <div class="file-name">${f.name}</div>
        <div class="file-type">${(f.ext||'').toUpperCase()}</div>
        <div class="file-link">在 Google Drive 開啟 ↗</div>
      </div>`;
    list.appendChild(el);
  });
  document.getElementById('sec-files').style.display = 'block';
  hasContent = true;
}

if (DATA.images && DATA.images.length) {
  const grid = document.getElementById('images-grid');
  DATA.images.forEach(img => {
    const el = document.createElement('a');
    el.href = img.drive_url || '#';
    el.target = '_blank';
    el.innerHTML = `
      <div class="img-thumb">
        ${img.thumbnail ? `<img src="${img.thumbnail}" alt="${img.name}">` : '🖼️'}
      </div>
      <div class="img-label">${img.name}</div>`;
    grid.appendChild(el);
  });
  document.getElementById('sec-images').style.display = 'block';
  hasContent = true;
}

if (hasContent) {
  document.getElementById('no-content').style.display = 'none';
  if (DATA.generated)
    document.getElementById('gen-note').textContent = '生成時間：' + DATA.generated;
}
</script>
</body>
</html>
