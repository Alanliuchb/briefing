<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026-06-04 每日彙整</title>
<style>
  :root { --bg: #0f1117; --text: #e8eaf0; --accent: #4f6ef7; --card: #1e2130; --muted: #a0aec0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 32px 16px; }
  .container { max-width: 800px; margin: 0 auto; }
  .nav { margin-bottom: 24px; }
  .nav a { color: var(--accent); text-decoration: none; font-size: 14px; }
  .nav a:hover { text-decoration: underline; }
  h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 40px; }
  .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 16px; }
  footer { margin-top: 60px; text-align: center; color: var(--muted); font-size: 12px; border-top: 1px solid #2a2f45; padding-top: 20px; }
  .analyze-btn {
    display: inline-block; margin-top: 8px; padding: 6px 14px;
    background: transparent; border: 1px solid #4f6ef7; border-radius: 6px;
    color: #a0aec0; font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .analyze-btn:hover { background: rgba(79,110,247,0.13); color: #e8eaf0; }
  .copy-toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #4f6ef7; color: white; padding: 10px 20px;
    border-radius: 8px; font-size: 14px; z-index: 9999;
    transition: opacity 0.5s; opacity: 1;
  }
</style>
</head>
<body>
<div class="container">
  <nav class="nav"><a href="../../index.html">← 回首頁</a></nav>
  <h1>2026-06-04（星期四）</h1>
  <p class="subtitle">每日閱讀彙整</p>
  <div class="empty-state">
    <div class="icon">📭</div>
    <p>今天尚未新增任何內容</p>
  </div>
  <footer>生成時間：2026-06-04 18:04（台灣時間）</footer>
</div>
<script>
function requestAnalysis(btn, date, title) {
  const text = '幫我深度分析 ' + date + ' 的 PDF：' + title;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent; btn.textContent = '已複製 ✓';
    setTimeout(() => btn.textContent = orig, 2000);
    showToast('✅ 已複製！請貼給 Claude');
  });
}
function showToast(msg) {
  const t = document.createElement('div'); t.className = 'copy-toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; }, 2000);
  setTimeout(() => { t.remove(); }, 2500);
}
</script>
</body>
</html>
