<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日記錄 — Alan's Briefing</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0f1117;
  color: #e8eaf0;
  min-height: 100vh;
  padding: 24px 16px;
  max-width: 720px;
  margin: 0 auto;
}
a { color: inherit; text-decoration: none; }
.nav-back {
  font-size: 0.85rem;
  color: #6b7280;
  margin-bottom: 24px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: color 0.15s;
}
.nav-back:hover { color: #9ca3af; }
h1 {
  font-size: 1.6rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
}
.subtitle {
  font-size: 0.85rem;
  color: #6b7280;
  margin-bottom: 32px;
}
/* Year tabs */
.year-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.year-tab {
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid #2d3142;
  background: transparent;
  color: #6b7280;
  transition: all 0.15s;
}
.year-tab.active, .year-tab:hover {
  background: #4f6ef7;
  border-color: #4f6ef7;
  color: #fff;
}
/* Month section */
.month-section { margin-bottom: 32px; display: none; }
.month-section.visible { display: block; }
.month-header {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #6b7280;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #1f2937;
}
/* Day cards */
.day-card {
  background: #1a1d27;
  border: 1px solid #2d3142;
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: border-color 0.15s, background 0.15s;
}
.day-card:hover { border-color: #4f6ef7; background: #1f2336; }
.day-info { flex: 1; }
.day-date {
  font-size: 0.95rem;
  font-weight: 600;
  color: #fff;
  margin-bottom: 3px;
}
.day-desc {
  font-size: 0.8rem;
  color: #6b7280;
}
.day-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.tag {
  font-size: 0.68rem;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  letter-spacing: 0.3px;
}
.tag-url  { background: #1a3a5c; color: #60a5fa; }
.tag-pdf  { background: #3a1a1a; color: #f87171; }
.tag-img  { background: #1a3a2a; color: #34d399; }
.tag-note { background: #2a2a1a; color: #fbbf24; }
.tag-doc  { background: #2d1a3a; color: #a78bfa; }
.arrow { font-size: 1rem; color: #4b5563; }
.empty {
  font-size: 0.9rem;
  color: #4b5563;
  font-style: italic;
  padding: 20px 0;
  text-align: center;
}
#last-updated {
  font-size: 0.75rem;
  color: #374151;
  margin-top: 40px;
  text-align: center;
}

/* Collapsible month sections */
.month-header {
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.toggle-arrow {
  font-size: 0.7rem;
  color: #4b5563;
  transition: transform 0.2s;
  flex-shrink: 0;
}
.month-entries {
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.month-entries.collapsed {
  display: none;
}
</style>
</head>
<body>

<a class="nav-back" href="../index.html">← 回到主頁</a>

<h1>📔 每日記錄</h1>
<p class="subtitle" id="entry-count">載入中...</p>

<div class="year-tabs" id="year-tabs"></div>
<div id="entries-container"></div>

<p id="last-updated"></p>

<script>
const MONTHS_ZH = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

fetch('manifest.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    const entries = data.entries || [];
    if (!entries.length) {
      document.getElementById('entries-container').innerHTML = '<p class="empty">尚無記錄</p>';
      document.getElementById('entry-count').textContent = '目前沒有記錄';
      return;
    }

    document.getElementById('entry-count').textContent = `共 ${entries.length} 筆記錄`;

    // Group by year → month
    const grouped = {};
    entries.forEach(e => {
      const [y, m] = e.date.split('-');
      if (!grouped[y]) grouped[y] = {};
      if (!grouped[y][m]) grouped[y][m] = [];
      grouped[y][m].push(e);
    });

    const years = Object.keys(grouped).sort((a,b) => b-a);
    const tabsEl = document.getElementById('year-tabs');
    const containerEl = document.getElementById('entries-container');

    years.forEach((yr, i) => {
      // Year tab
      const tab = document.createElement('button');
      tab.className = 'year-tab' + (i === 0 ? ' active' : '');
      tab.textContent = yr + ' 年';
      tab.dataset.year = yr;
      tab.addEventListener('click', () => {
        document.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.month-section').forEach(s => {
          s.classList.toggle('visible', s.dataset.year === yr);
        });
      });
      tabsEl.appendChild(tab);

      // Month sections
      const months = Object.keys(grouped[yr]).sort((a,b) => b-a);
      months.forEach(mo => {
        const sec = document.createElement('div');
        sec.className = 'month-section' + (i === 0 ? ' visible' : '');
        sec.dataset.year = yr;
        const isFirst = (i === 0 && months.indexOf(mo) === 0);
        const arrowChar = isFirst ? '▼' : '▶';
        sec.innerHTML = `<div class="month-header"><span>${yr} 年 ${MONTHS_ZH[parseInt(mo)-1]}</span><span class="toggle-arrow">${arrowChar}</span></div>`;
        const entriesDiv = document.createElement('div');
        entriesDiv.className = 'month-entries' + (isFirst ? '' : ' collapsed');
        sec.appendChild(entriesDiv);

        grouped[yr][mo].sort((a,b) => b.date.localeCompare(a.date)).forEach(e => {
          const card = document.createElement('a');
          card.className = 'day-card';
          card.href = `${yr}/${mo}/${e.date}.html`;

          const tags = (e.types || []).map(t => `<span class="tag tag-${t}">${tagLabel(t)}</span>`).join('');
          card.innerHTML = `
            <div class="day-info">
              <div class="day-date">${fmtDate(e.date)}</div>
              <div class="day-desc">${e.title || '（無標題）'}</div>
              ${tags ? '<div class="day-tags">' + tags + '</div>' : ''}
            </div>
            <span class="arrow">›</span>
          `;
          entriesDiv.appendChild(card);
        });
        // Collapsible click handler
        const header = sec.querySelector('.month-header');
        header.addEventListener('click', () => {
          const isCollapsed = entriesDiv.classList.contains('collapsed');
          entriesDiv.classList.toggle('collapsed', !isCollapsed);
          header.querySelector('.toggle-arrow').textContent = isCollapsed ? '▼' : '▶';
        });
        containerEl.appendChild(sec);
      });
    });

    if (data.generated)
      document.getElementById('last-updated').textContent = '上次更新：' + data.generated;
  })
  .catch(() => {
    document.getElementById('entries-container').innerHTML = '<p class="empty">暫無記錄</p>';
    document.getElementById('entry-count').textContent = '尚未有任何記錄';
  });

function fmtDate(s) {
  if (!s) return '';
  const [y, m, d] = s.split('-');
  return `${y} 年 ${parseInt(m)} 月 ${parseInt(d)} 日`;
}
function tagLabel(t) {
  return { url:'連結', pdf:'PDF', img:'照片', note:'筆記', doc:'文件' }[t] || t;
}
</script>
</body>
</html>
