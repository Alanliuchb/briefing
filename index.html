<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alan's Daily Briefing</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1117;
    color: #e8eaf0;
    min-height: 100vh;
    padding: 24px 16px;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    color: #fff;
  }
  .subtitle {
    font-size: 0.9rem;
    color: #6b7280;
    margin-bottom: 32px;
  }
  .section { margin-bottom: 32px; }
  .section-title {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #6b7280;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1f2937;
  }
  .card {
    background: #1a1d27;
    border: 1px solid #2d3142;
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 12px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: border-color 0.15s, background 0.15s;
  }
  .card:hover { border-color: #4f6ef7; background: #1f2336; }
  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .badge {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .badge-fin  { background: #1a3a5c; color: #60a5fa; }
  .badge-tech { background: #1a3a2a; color: #34d399; }
  .card-title { font-size: 1rem; font-weight: 600; color: #fff; }
  .card-date  { font-size: 0.8rem; color: #6b7280; }
  .card-desc  { font-size: 0.85rem; color: #9ca3af; line-height: 1.5; }
  .empty { font-size: 0.9rem; color: #4b5563; font-style: italic; padding: 12px 0; }
  #last-updated { font-size: 0.75rem; color: #374151; margin-top: 40px; text-align: center; }
</style>
</head>
<body>

<h1>📊 Alan's Daily Briefing</h1>
<p class="subtitle" id="today-date"></p>

<div id="report-container">
  <p class="empty">載入報告清單中...</p>
</div>

<p id="last-updated"></p>

<script>
function today() {
  const d = new Date();
  const tz = new Date(d.toLocaleString("en-US", {timeZone: "Asia/Taipei"}));
  return tz.getFullYear().toString() +
    String(tz.getMonth()+1).padStart(2,'0') +
    String(tz.getDate()).padStart(2,'0');
}
function fmtDisplay(s) {
  if (!s || s.length !== 8) return '';
  return s.slice(0,4)+'年'+s.slice(4,6)+'月'+s.slice(6,8)+'日';
}
document.getElementById('today-date').textContent = '今日：' + fmtDisplay(today());

fetch('manifest.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    const c = document.getElementById('report-container');
    c.innerHTML = '';
    const reports = [
      { key:'tech', label:'TECH', badgeClass:'badge-tech', title:'科技產業情報', desc:'科技與 AI 產業每日重點情報' },
      { key:'fin',  label:'FIN',  badgeClass:'badge-fin',  title:'全球財經情報', desc:'全球金融市場與經濟動態' }
    ];
    reports.forEach(rpt => {
      const sec = document.createElement('div');
      sec.className = 'section';
      sec.innerHTML = '<div class="section-title">'+rpt.title+'</div>';
      const entry = data[rpt.key];
      if (!entry) { sec.innerHTML += '<p class="empty">尚無報告</p>'; c.appendChild(sec); return; }
      ['html','pdf'].forEach(fmt => {
        if (!entry[fmt]) return;
        const card = document.createElement('a');
        card.className = 'card';
        card.href = entry[fmt];
        if (fmt === 'html') card.target = '_blank';
        card.innerHTML =
          '<div class="card-header"><span class="badge '+rpt.badgeClass+'">'+rpt.label+'</span>'+
          '<span class="card-title">'+(fmt==='html'?'🌐 網頁版':'📄 PDF 版')+'</span></div>'+
          '<div class="card-date">'+fmtDisplay(entry.date)+'</div>'+
          '<div class="card-desc">'+rpt.desc+'（'+fmt.toUpperCase()+'）</div>';
        sec.appendChild(card);
      });
      c.appendChild(sec);
    });
    if (data.generated)
      document.getElementById('last-updated').textContent = '上次更新：' + data.generated;
  })
  .catch(() => {
    document.getElementById('report-container').innerHTML =
      '<p class="empty">暫無報告（manifest.json 尚未產生）</p>';
  });
</script>
</body>
</html>
